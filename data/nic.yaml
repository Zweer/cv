    description: |
      Joined as the third member of the ICT department — after the CIO and an IT support specialist — when the company was still a startup (then called BePower), building the technology platform powering Italy's second-largest and one of Europe's largest EV charging networks.

      Started as a technical Project Manager, coordinating 10+ external consultants to design and implement all core business systems, with a primary focus on the consumer-facing mobile app — which has since undergone two complete rewrites, with a third currently in progress.

      As the company scaled, progressively consolidated all delivery functions under my leadership: first developers, testers and analysts, then project managers. Today I lead a team of 20+ people covering the full delivery lifecycle — from ideation and requirements through development to testing and release. An additional 30–40 external consultants operate under my coordination, accounting for over 80% of total code output.

      Currently the largest team manager in the company, with a dual focus: people management across all delivery streams, and long-term technical strategy — evaluating solutions and providing architectural guidance to shape business roadmaps before they are formalized.

      Key figures: ~€10M annual budget · 100% cloud-native architecture (AWS) · 99.99% uptime.

