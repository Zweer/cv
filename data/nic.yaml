    description: |
      Joined a Salesforce-focused consultancy but initially operated entirely outside the CRM space, leading a team of 5 developers on custom Node.js applications: a backend and realtime chatbot powering a mobile app for an automotive client, and a private customer portal for an energy utility — including integrations with all legacy systems.

      As custom projects wound down, transitioned to Salesforce delivery for banking and pharmaceutical clients, bringing an independent, platform-agnostic perspective to CRM architecture. This cross-domain experience led to a broader Architect role, bridging the Salesforce ecosystem with custom backends and cloud infrastructure (AWS, Heroku).

      Across all projects, served as technical leader: defining application architecture and infrastructure, advising the PM on technical feasibility, and mentoring developers across teams.

